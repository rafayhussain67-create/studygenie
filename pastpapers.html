<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenie — Past Papers</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #1a9e6e; --green-light: #e6f7f1; --green-dark: #0d6b4a; --text: #0f1117; --text-muted: #6b7280; --border: #e5e7eb; --bg: #f9fafb; --white: #fff; --font-head: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif; --red: #e24b4a; --red-light: #fcebeb; --yellow: #f59e0b; --yellow-light: #fffbe6; }
  body.dark { --text: #f1f5f9; --text-muted: #94a3b8; --border: #2d3748; --bg: #0f1117; --white: #1a1f2e; --green-light: #0d2d20; --yellow-light: #2a1f00; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--white); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; padding: 0 5%; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-head); font-size: 19px; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-mark { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .btn-nav { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 7px 14px; font-family: var(--font-body); font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .btn-nav:hover { border-color: var(--green); color: var(--green); }

  .page { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
  .page-header h1 { font-family: var(--font-head); font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .page-header p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

  .setup-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 24px; }
  .setup-card h2 { font-family: var(--font-head); font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; font-weight: 600; }
  select, input[type="text"] { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: var(--font-body); font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
  select:focus, input:focus { border-color: var(--green); }
  .section-counts { display: flex; gap: 12px; margin-bottom: 20px; }
  .count-box { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .count-box.active { border-color: var(--green); background: var(--green-light); }
  .count-box .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
  .count-box .num { font-family: var(--font-head); font-size: 24px; font-weight: 800; color: var(--green); }
  .count-box select { border: none; background: transparent; font-family: var(--font-head); font-size: 20px; font-weight: 800; color: var(--green); text-align: center; cursor: pointer; padding: 0; width: 60px; }
  .gen-btn { width: 100%; background: var(--green); color: white; border: none; border-radius: 12px; padding: 14px; font-family: var(--font-head); font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .gen-btn:hover { background: var(--green-dark); }
  .gen-btn:disabled { background: #9ca3af; cursor: not-allowed; }

  /* PAPER OUTPUT */
  .paper { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .paper-header { background: var(--green); color: white; padding: 24px 28px; }
  .paper-header h2 { font-family: var(--font-head); font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .paper-meta { font-size: 13px; opacity: 0.85; display: flex; gap: 16px; flex-wrap: wrap; }
  .paper-actions { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
  .paper-btn { padding: 8px 18px; border-radius: 8px; font-family: var(--font-head); font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); transition: all 0.15s; }
  .paper-btn:hover { border-color: var(--green); color: var(--green); }
  .paper-btn.primary { background: var(--green); color: white; border-color: var(--green); }
  .paper-btn.primary:hover { background: var(--green-dark); }

  .section { padding: 24px 28px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-title { font-family: var(--font-head); font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--green-dark); }
  .section-marks { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }
  .question { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
  .question:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .q-num { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--green); margin-bottom: 6px; }
  .q-text { font-size: 14px; font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
  .q-marks { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .option { font-size: 13px; padding: 7px 12px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .option:hover { border-color: var(--green); background: var(--green-light); }
  .option.correct { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 600; }
  .option.wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .answer-reveal { display: none; background: var(--green-light); border: 1px solid var(--green); border-radius: 10px; padding: 12px 14px; margin-top: 10px; font-size: 13px; line-height: 1.7; }
  .answer-reveal.show { display: block; }
  .key-points { margin-top: 8px; }
  .key-points li { font-size: 12px; color: var(--green-dark); margin-bottom: 2px; }
  .show-answer-btn { font-size: 12px; color: var(--green); background: none; border: none; cursor: pointer; font-weight: 600; font-family: var(--font-body); padding: 0; margin-top: 6px; }

  .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: bop 1.2s infinite; display: inline-block; margin: 0 3px; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bop { 0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1} }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--white); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform 0.3s; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media(max-width:600px) { .form-grid { grid-template-columns: 1fr; } .section-counts { flex-wrap: wrap; } }
</style>
</head>
<body>
<nav>
  <a href="app.html" class="logo"><div class="logo-mark">✦</div>StudyGenie</a>
  <div class="nav-right">
    <a href="app.html" class="btn-nav">← Back to Chat</a>
    <button class="btn-nav" onclick="toggleDark()" id="dark-btn">🌙</button>
    <button class="btn-nav" onclick="signOut()" style="color:#e24b4a;border-color:#e24b4a">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📋 Past Papers Generator</h1>
    <p>Generate realistic exam-style questions in the format of Pakistani and Cambridge boards</p>
  </div>

  <div class="setup-card">
    <h2>Generate a Paper</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Board</label>
        <select id="board-select">
          <option value="Federal Board (FBISE)">Federal Board (FBISE)</option>
          <option value="Punjab Board">Punjab Board</option>
          <option value="Sindh Board">Sindh Board</option>
          <option value="KPK Board">KPK Board</option>
          <option value="Cambridge O-Levels (CAIE)">Cambridge O-Levels (CAIE)</option>
          <option value="Cambridge A-Levels (CAIE)">Cambridge A-Levels (CAIE)</option>
          <option value="AKU-EB">AKU-EB</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <select id="subject-select">
          <option>Mathematics</option>
          <option>Physics</option>
          <option>Chemistry</option>
          <option>Biology</option>
          <option>English</option>
          <option>Urdu</option>
          <option>Computer Science</option>
          <option>Economics</option>
          <option>Pakistan Studies</option>
          <option>Islamiyat</option>
        </select>
      </div>
      <div class="form-group">
        <label>Topic / Chapter</label>
        <input type="text" id="topic-input" placeholder="e.g. Kinematics, Organic Chemistry, Integration">
      </div>
      <div class="form-group">
        <label>Level</label>
        <select id="level-select">
          <option>Matric</option>
          <option>Intermediate</option>
          <option>O-Levels</option>
          <option>A-Levels</option>
        </select>
      </div>
    </div>

    <p style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text-muted)">NUMBER OF QUESTIONS PER SECTION</p>
    <div class="section-counts">
      <div class="count-box">
        <div class="label">MCQs (Section A)</div>
        <select id="mcq-count" style="width:auto">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="15">15</option>
          <option value="20">20</option>
        </select>
      </div>
      <div class="count-box">
        <div class="label">Short Q (Section B)</div>
        <select id="short-count" style="width:auto">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="7">7</option>
          <option value="10">10</option>
        </select>
      </div>
      <div class="count-box">
        <div class="label">Long Q (Section C)</div>
        <select id="long-count" style="width:auto">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="5">5</option>
        </select>
      </div>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generatePaper()">Generate Past Paper →</button>
  </div>

  <div id="paper-container"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  let currentPaper = null;
  let selectedAnswers = {};
  let answersRevealed = {};

  if (localStorage.getItem('studygenie-dark') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('dark-btn').textContent = '☀️';
  }
  function toggleDark() {
    document.body.classList.toggle('dark');
    document.getElementById('dark-btn').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('studygenie-dark', document.body.classList.contains('dark'));
  }
  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function generatePaper() {
    const board = document.getElementById('board-select').value;
    const subject = document.getElementById('subject-select').value;
    const topic = document.getElementById('topic-input').value.trim();
    const level = document.getElementById('level-select').value;
    if (!topic) { showToast('⚠️ Please enter a topic'); return; }

    const btn = document.getElementById('gen-btn');
    btn.disabled = true; btn.textContent = 'Generating...';
    document.getElementById('paper-container').innerHTML = `
      <div style="text-align:center;padding:60px;background:var(--white);border-radius:16px;border:1px solid var(--border)">
        <div class="dots"><span></span><span></span><span></span></div>
        <p style="margin-top:14px;font-size:14px;color:var(--text-muted)">Generating ${board} style paper on ${topic}...</p>
      </div>`;

    try {
      const res = await fetch('/api/pastpapers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          board, subject, topic, level,
          sections: {
            mcq: parseInt(document.getElementById('mcq-count').value),
            short: parseInt(document.getElementById('short-count').value),
            long: parseInt(document.getElementById('long-count').value)
          }
        })
      });
      const data = await res.json();
      if (data.paper) {
        currentPaper = data.paper;
        selectedAnswers = {}; answersRevealed = {};
        renderPaper(data.paper);
      } else {
        document.getElementById('paper-container').innerHTML = `<p style="color:#e24b4a;text-align:center;padding:40px">Could not generate paper. Please try again.</p>`;
      }
    } catch(e) {
      document.getElementById('paper-container').innerHTML = `<p style="color:#e24b4a;text-align:center;padding:40px">Error: ${e.message}</p>`;
    }
    btn.disabled = false; btn.textContent = 'Generate Past Paper →';
  }

  function renderPaper(paper) {
    const secA = paper.sections.A;
    const secB = paper.sections.B;
    const secC = paper.sections.C;

    document.getElementById('paper-container').innerHTML = `
      <div class="paper" id="paper-output">
        <div class="paper-header">
          <h2>${paper.title}</h2>
          <div class="paper-meta">
            <span>📋 ${paper.board}</span>
            <span>📚 ${paper.subject}</span>
            <span>🎯 Total: ${paper.totalMarks} marks</span>
          </div>
        </div>
        <div class="paper-actions">
          <button class="paper-btn primary" onclick="window.print()">🖨️ Print</button>
          <button class="paper-btn" onclick="copyPaper()">📋 Copy text</button>
          <button class="paper-btn" onclick="revealAllAnswers()">✅ Show all answers</button>
          <button class="paper-btn" onclick="generatePaper()">🔄 New paper</button>
        </div>

        <div class="section">
          <div class="section-title">${secA.title}</div>
          <div class="section-marks">${secA.marks}</div>
          ${(secA.questions || []).map((q, i) => `
            <div class="question" id="q-a-${i}">
              <div class="q-num">Q${q.num}.</div>
              <div class="q-text">${q.question}</div>
              <div class="options">
                ${(q.options || []).map((opt, oi) => `
                  <div class="option" id="opt-${i}-${oi}" onclick="selectMCQ(${i}, ${oi}, '${q.answer}')">${opt}</div>
                `).join('')}
              </div>
              <div class="answer-reveal" id="rev-a-${i}">
                ✅ Correct Answer: <strong>${q.answer}</strong><br>
                💡 ${q.explanation || ''}
              </div>
            </div>`).join('')}
        </div>

        <div class="section">
          <div class="section-title">${secB.title}</div>
          <div class="section-marks">${secB.marks}</div>
          ${(secB.questions || []).map((q, i) => `
            <div class="question">
              <div class="q-num">Q${q.num}.</div>
              <div class="q-text">${q.question}</div>
              <div class="q-marks">[${q.marks} marks]</div>
              <button class="show-answer-btn" onclick="toggleReveal('rev-b-${i}', this)">Show model answer ▼</button>
              <div class="answer-reveal" id="rev-b-${i}">
                <strong>Model Answer:</strong><br>${q.answer}
                ${q.keyPoints?.length ? '<ul class="key-points" style="margin-top:8px">' + q.keyPoints.map(p=>`<li>• ${p}</li>`).join('') + '</ul>' : ''}
              </div>
            </div>`).join('')}
        </div>

        <div class="section">
          <div class="section-title">${secC.title}</div>
          <div class="section-marks">${secC.marks}</div>
          ${(secC.questions || []).map((q, i) => `
            <div class="question">
              <div class="q-num">Q${q.num}.</div>
              <div class="q-text">${q.question}</div>
              <div class="q-marks">[${q.marks} marks]</div>
              <button class="show-answer-btn" onclick="toggleReveal('rev-c-${i}', this)">Show model answer ▼</button>
              <div class="answer-reveal" id="rev-c-${i}">
                <strong>Model Answer:</strong><br>${q.answer}
                ${q.keyPoints?.length ? '<ul class="key-points" style="margin-top:8px">' + q.keyPoints.map(p=>`<li>• ${p}</li>`).join('') + '</ul>' : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  function selectMCQ(qIdx, optIdx, correctAnswer) {
    const opts = document.querySelectorAll(`[id^="opt-${qIdx}-"]`);
    opts.forEach((o, i) => {
      o.classList.remove('correct', 'wrong');
      const optLetter = String.fromCharCode(65 + i); // A, B, C, D
      if (i === optIdx) {
        o.classList.add(optLetter === correctAnswer ? 'correct' : 'wrong');
      }
      if (optLetter === correctAnswer) o.classList.add('correct');
    });
    document.getElementById(`rev-a-${qIdx}`).classList.add('show');
  }

  function toggleReveal(id, btn) {
    const el = document.getElementById(id);
    el.classList.toggle('show');
    btn.textContent = el.classList.contains('show') ? 'Hide answer ▲' : 'Show model answer ▼';
  }

  function revealAllAnswers() {
    document.querySelectorAll('.answer-reveal').forEach(el => el.classList.add('show'));
    document.querySelectorAll('.show-answer-btn').forEach(btn => btn.textContent = 'Hide answer ▲');
    showToast('✅ All answers revealed');
  }

  function copyPaper() {
    const paper = document.getElementById('paper-output');
    if (paper) navigator.clipboard.writeText(paper.innerText).then(() => showToast('📋 Paper copied!'));
  }

  // Auth check
  _supa.auth.getSession().then(({ data: { session } }) => {
    if (!session) window.location.href = 'login.html';
  });
</script>
</body>
</html>
