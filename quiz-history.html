<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenie — Quiz History</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a9e6e; --green-light: #e6f7f1; --green-dark: #0d6b4a;
    --text: #0f1117; --text-muted: #6b7280;
    --border: #e5e7eb; --bg: #f9fafb; --white: #ffffff;
    --font-head: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif;
    --red: #e24b4a; --red-light: #fcebeb;
    --yellow: #f59e0b; --yellow-light: #fffbe6;
    --purple: #6366f1; --purple-light: #eef2ff;
  }
  body.dark {
    --text: #f1f5f9; --text-muted: #94a3b8;
    --border: #2d3748; --bg: #0f1117; --white: #1a1f2e;
    --green-light: #0d2d20; --yellow-light: #2a1f00; --purple-light: #1e1b4b;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--white); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; padding: 0 5%; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-head); font-size: 19px; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-mark { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .btn-nav { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 7px 14px; font-family: var(--font-body); font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .btn-nav:hover { border-color: var(--green); color: var(--green); }
  .page { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
  .page-header h1 { font-family: var(--font-head); font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .page-header p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-num { font-family: var(--font-head); font-size: 26px; font-weight: 800; color: var(--green); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .quiz-list { display: flex; flex-direction: column; gap: 12px; }
  .quiz-item { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; }
  .score-ring { width: 56px; height: 56px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border: 3px solid; }
  .score-ring.high { border-color: var(--green); background: var(--green-light); }
  .score-ring.mid { border-color: var(--yellow); background: var(--yellow-light); }
  .score-ring.low { border-color: var(--red); background: var(--red-light); }
  .score-pct { font-family: var(--font-head); font-size: 14px; font-weight: 800; }
  .score-ring.high .score-pct { color: var(--green); }
  .score-ring.mid .score-pct { color: var(--yellow); }
  .score-ring.low .score-pct { color: var(--red); }
  .quiz-info { flex: 1; }
  .quiz-topic { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .quiz-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .quiz-score-text { font-size: 13px; color: var(--text-muted); text-align: right; flex-shrink: 0; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: var(--green-light); color: var(--green-dark); }
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-family: var(--font-head); font-size: 18px; margin-bottom: 6px; color: var(--text); }
  .topic-breakdown { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .topic-breakdown h3 { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .topic-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .topic-name { font-size: 13px; font-weight: 600; width: 140px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topic-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .topic-bar { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.5s; }
  .topic-bar.mid { background: var(--yellow); }
  .topic-bar.low { background: var(--red); }
  .topic-pct { font-size: 12px; font-weight: 700; width: 36px; text-align: right; color: var(--text-muted); }
  .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: bop 1.2s infinite; display: inline-block; margin: 0 3px; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bop { 0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1} }
  @media (max-width: 500px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<nav>
  <a href="app.html" class="logo"><div class="logo-mark">✦</div>StudyGenie</a>
  <div class="nav-right">
    <a href="app.html" class="btn-nav">← Back to Chat</a>
    <a href="history.html" class="btn-nav">📋 History</a>
    <button class="btn-nav" onclick="toggleDark()" id="dark-btn">🌙</button>
    <button class="btn-nav" onclick="signOut()" style="color:#e24b4a;border-color:#e24b4a">Sign Out</button>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <h1>🧠 Quiz History</h1>
    <p>Track your performance over time</p>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Quizzes taken</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-avg">—</div><div class="stat-label">Average score</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-best">—</div><div class="stat-label">Best score</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-topics">—</div><div class="stat-label">Topics practised</div></div>
  </div>
  <div id="breakdown-section"></div>
  <div id="quiz-list-container">
    <div style="text-align:center;padding:40px">
      <div class="dots"><span></span><span></span><span></span></div>
      <p style="margin-top:12px;font-size:14px;color:var(--text-muted)">Loading quiz history...</p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  if (localStorage.getItem('studygenie-dark') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('dark-btn').textContent = '☀️';
  }
  function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    document.getElementById('dark-btn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('studygenie-dark', isDark);
  }

  async function init() {
    const { data: { session } } = await _supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    const { data } = await _supa.from('quiz_history').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
    const quizzes = data || [];
    renderStats(quizzes);
    renderBreakdown(quizzes);
    renderList(quizzes);
  }

  function renderStats(quizzes) {
    document.getElementById('stat-total').textContent = quizzes.length;
    if (!quizzes.length) { ['stat-avg','stat-best','stat-topics'].forEach(id => document.getElementById(id).textContent = '0'); return; }
    const scores = quizzes.map(q => Math.round((q.score / q.total) * 100));
    document.getElementById('stat-avg').textContent = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) + '%';
    document.getElementById('stat-best').textContent = Math.max(...scores) + '%';
    const topics = new Set(quizzes.map(q => q.topic));
    document.getElementById('stat-topics').textContent = topics.size;
  }

  function renderBreakdown(quizzes) {
    if (quizzes.length < 2) return;
    const topicMap = {};
    quizzes.forEach(q => {
      if (!topicMap[q.topic]) topicMap[q.topic] = { total: 0, scores: [] };
      topicMap[q.topic].scores.push(Math.round((q.score / q.total) * 100));
    });
    const topics = Object.entries(topicMap).sort((a,b) => {
      const avgA = a[1].scores.reduce((x,y)=>x+y,0)/a[1].scores.length;
      const avgB = b[1].scores.reduce((x,y)=>x+y,0)/b[1].scores.length;
      return avgA - avgB; // worst first
    }).slice(0, 6);

    document.getElementById('breakdown-section').innerHTML = `
      <div class="topic-breakdown">
        <h3>📊 Performance by topic</h3>
        ${topics.map(([topic, data]) => {
          const avg = Math.round(data.scores.reduce((a,b)=>a+b,0)/data.scores.length);
          const cls = avg >= 70 ? '' : avg >= 40 ? 'mid' : 'low';
          return `<div class="topic-row">
            <div class="topic-name">${topic}</div>
            <div class="topic-bar-wrap"><div class="topic-bar ${cls}" style="width:${avg}%"></div></div>
            <div class="topic-pct">${avg}%</div>
          </div>`;
        }).join('')}
      </div>`;
  }

  function renderList(quizzes) {
    const container = document.getElementById('quiz-list-container');
    if (!quizzes.length) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">🧠</div><h3>No quizzes yet</h3><p>Take a quiz in the app and your scores will appear here</p></div>`;
      return;
    }
    container.innerHTML = `<div class="quiz-list">${quizzes.map(q => {
      const pct = Math.round((q.score / q.total) * 100);
      const cls = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';
      return `<div class="quiz-item">
        <div class="score-ring ${cls}"><div class="score-pct">${pct}%</div></div>
        <div class="quiz-info">
          <div class="quiz-topic">${q.topic}</div>
          <div class="quiz-meta">
            ${q.subject ? `<span class="badge">${q.subject}</span>` : ''}
            ${q.level ? `<span>${q.level}</span>` : ''}
            <span>${formatDate(q.created_at)}</span>
          </div>
        </div>
        <div class="quiz-score-text">${q.score} / ${q.total}<br><span style="font-size:11px;color:var(--text-muted)">correct</span></div>
      </div>`;
    }).join('')}</div>`;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
    return d.toLocaleDateString('en-PK', { day: 'numeric', month: 'short' });
  }

  init();
</script>
</body>
</html>
