<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenie — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #1a9e6e; --green-light: #e6f7f1; --green-dark: #0d6b4a; --text: #0f1117; --text-muted: #6b7280; --border: #e5e7eb; --bg: #f9fafb; --white: #fff; --font-head: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif; --red: #e24b4a; --yellow: #f59e0b; --purple: #6366f1; }
  body.dark { --text: #f1f5f9; --text-muted: #94a3b8; --border: #2d3748; --bg: #0f1117; --white: #1a1f2e; --green-light: #0d2d20; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--white); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; padding: 0 5%; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-head); font-size: 19px; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-mark { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .btn-nav { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 7px 14px; font-family: var(--font-body); font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .btn-nav:hover { border-color: var(--green); color: var(--green); }
  .page { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-family: var(--font-head); font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .page-header p { color: var(--text-muted); font-size: 14px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .stat-icon { font-size: 24px; margin-bottom: 8px; }
  .stat-num { font-family: var(--font-head); font-size: 28px; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .stat-change { font-size: 11px; margin-top: 4px; }
  .stat-change.up { color: var(--green); }
  .stat-change.down { color: var(--red); }

  /* CHARTS */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .chart-card h3 { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 200px; }

  /* WEAK AREAS */
  .weak-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .topic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .topic-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topic-bar-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .topic-bar { height: 100%; border-radius: 3px; }
  .topic-bar.strong { background: var(--green); }
  .topic-bar.weak { background: var(--red); }
  .topic-pct { font-size: 11px; font-weight: 700; width: 32px; text-align: right; }

  /* STREAK CALENDAR */
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day { width: 100%; aspect-ratio: 1; border-radius: 3px; }
  .cal-day.active { background: var(--green); }
  .cal-day.inactive { background: var(--border); }
  .cal-day.today { outline: 2px solid var(--green-dark); }

  .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: bop 1.2s infinite; display: inline-block; margin: 0 3px; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bop { 0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1} }
  @media(max-width:700px) { .stats-grid { grid-template-columns: repeat(2,1fr); } .charts-row,.weak-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav>
  <a href="app.html" class="logo"><div class="logo-mark">✦</div>StudyGenie</a>
  <div class="nav-right">
    <a href="app.html" class="btn-nav">← Back to Chat</a>
    <button class="btn-nav" onclick="toggleDark()" id="dark-btn">🌙</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📊 My Analytics</h1>
    <p>Track your learning progress over time</p>
  </div>

  <div id="content">
    <div style="text-align:center;padding:60px">
      <div class="dots"><span></span><span></span><span></span></div>
      <p style="margin-top:14px;color:var(--text-muted);font-size:14px">Loading your data...</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  if (localStorage.getItem('studygenie-dark') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('dark-btn').textContent = '☀️';
  }
  function toggleDark() {
    document.body.classList.toggle('dark');
    document.getElementById('dark-btn').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('studygenie-dark', document.body.classList.contains('dark'));
  }

  async function init() {
    const { data: { session } } = await _supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    const uid = session.user.id;

    const [histRes, quizRes, streakRes] = await Promise.all([
      _supa.from('question_history').select('*').eq('user_id', uid).order('created_at', { ascending: true }),
      _supa.from('quiz_history').select('*').eq('user_id', uid).order('created_at', { ascending: true }),
      _supa.from('study_streaks').select('*').eq('user_id', uid).single()
    ]);

    const history = histRes.data || [];
    const quizzes = quizRes.data || [];
    const streak = streakRes.data || { current_streak: 0, longest_streak: 0 };

    renderAll(history, quizzes, streak);
  }

  function renderAll(history, quizzes, streak) {
    const totalQ = history.length;
    const totalQuiz = quizzes.length;
    const avgScore = quizzes.length ? Math.round(quizzes.reduce((a,q) => a + Math.round((q.score/q.total)*100), 0) / quizzes.length) : 0;

    // Subject breakdown
    const subjectCounts = {};
    history.forEach(h => { if(h.subject) subjectCounts[h.subject] = (subjectCounts[h.subject]||0)+1; });
    const topSubject = Object.entries(subjectCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—';

    // Daily activity for last 30 days
    const days = 30;
    const dayMap = {};
    const now = new Date();
    for(let i = days-1; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate()-i);
      dayMap[d.toISOString().split('T')[0]] = 0;
    }
    history.forEach(h => {
      const d = h.created_at?.split('T')[0];
      if(d && dayMap[d] !== undefined) dayMap[d]++;
    });

    // Quiz scores over time
    const quizDates = quizzes.slice(-14).map(q => new Date(q.created_at).toLocaleDateString('en-PK', {month:'short',day:'numeric'}));
    const quizScores = quizzes.slice(-14).map(q => Math.round((q.score/q.total)*100));

    // Weak/strong topics from quiz history
    const topicMap = {};
    quizzes.forEach(q => {
      if(!topicMap[q.topic]) topicMap[q.topic] = { sum: 0, count: 0 };
      topicMap[q.topic].sum += Math.round((q.score/q.total)*100);
      topicMap[q.topic].count++;
    });
    const topics = Object.entries(topicMap).map(([t,d]) => ({ topic: t, avg: Math.round(d.sum/d.count) })).sort((a,b)=>a.avg-b.avg);
    const weakTopics = topics.slice(0,4);
    const strongTopics = topics.slice(-4).reverse();

    document.getElementById('content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">❓</div><div class="stat-num">${totalQ}</div><div class="stat-label">Questions asked</div></div>
        <div class="stat-card"><div class="stat-icon">🧠</div><div class="stat-num">${totalQuiz}</div><div class="stat-label">Quizzes taken</div></div>
        <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-num">${avgScore}%</div><div class="stat-label">Avg quiz score</div></div>
        <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-num">${streak.current_streak}</div><div class="stat-label">Day streak (best: ${streak.longest_streak})</div></div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <h3>📅 Daily Activity (last 30 days)</h3>
          <div class="chart-wrap"><canvas id="activity-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>📚 Questions by Subject</h3>
          <div class="chart-wrap"><canvas id="subject-chart"></canvas></div>
        </div>
      </div>

      ${quizzes.length >= 2 ? `
      <div class="chart-card" style="margin-bottom:20px">
        <h3>📈 Quiz Score Trend</h3>
        <div class="chart-wrap"><canvas id="quiz-chart"></canvas></div>
      </div>` : ''}

      <div class="weak-row">
        <div class="chart-card">
          <h3>⚠️ Topics to improve</h3>
          ${weakTopics.length ? weakTopics.map(t => `
            <div class="topic-row">
              <div class="topic-name">${t.topic}</div>
              <div class="topic-bar-wrap"><div class="topic-bar weak" style="width:${t.avg}%"></div></div>
              <div class="topic-pct" style="color:var(--red)">${t.avg}%</div>
            </div>`).join('') : '<p style="color:var(--text-muted);font-size:13px">Take some quizzes to see weak areas</p>'}
        </div>
        <div class="chart-card">
          <h3>💪 Strong topics</h3>
          ${strongTopics.length ? strongTopics.map(t => `
            <div class="topic-row">
              <div class="topic-name">${t.topic}</div>
              <div class="topic-bar-wrap"><div class="topic-bar strong" style="width:${t.avg}%"></div></div>
              <div class="topic-pct" style="color:var(--green)">${t.avg}%</div>
            </div>`).join('') : '<p style="color:var(--text-muted);font-size:13px">Keep taking quizzes to find your strengths</p>'}
        </div>
      </div>`;

    // Activity chart
    const isDark = document.body.classList.contains('dark');
    const textColor = isDark ? '#94a3b8' : '#6b7280';
    const gridColor = isDark ? '#2d3748' : '#e5e7eb';

    new Chart(document.getElementById('activity-chart'), {
      type: 'bar',
      data: {
        labels: Object.keys(dayMap).map(d => { const dt = new Date(d); return dt.getDate() === 1 || Object.keys(dayMap).indexOf(d) === 0 ? dt.toLocaleDateString('en-PK',{month:'short',day:'numeric'}) : dt.getDate()+''; }),
        datasets: [{ data: Object.values(dayMap), backgroundColor: '#1a9e6e', borderRadius: 4, borderSkipped: false }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: textColor, stepSize: 1 }, grid: { color: gridColor } }, x: { ticks: { color: textColor, maxTicksLimit: 8 }, grid: { display: false } } } }
    });

    // Subject chart
    const subLabels = Object.keys(subjectCounts);
    const subData = Object.values(subjectCounts);
    const colors = ['#1a9e6e','#6366f1','#f59e0b','#e24b4a','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16'];
    if (subLabels.length) {
      new Chart(document.getElementById('subject-chart'), {
        type: 'doughnut',
        data: { labels: subLabels, datasets: [{ data: subData, backgroundColor: colors.slice(0, subLabels.length), borderWidth: 2, borderColor: isDark ? '#1a1f2e' : '#fff' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: textColor, font: { size: 11 }, padding: 8 } } } }
      });
    }

    // Quiz score trend
    if (quizzes.length >= 2) {
      new Chart(document.getElementById('quiz-chart'), {
        type: 'line',
        data: {
          labels: quizDates,
          datasets: [{ data: quizScores, borderColor: '#1a9e6e', backgroundColor: 'rgba(26,158,110,0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#1a9e6e', pointRadius: 4 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: { color: textColor, callback: v => v+'%' }, grid: { color: gridColor } }, x: { ticks: { color: textColor }, grid: { display: false } } } }
      });
    }
  }

  init();
</script>
</body>
</html>
