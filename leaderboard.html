<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenie — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #1a9e6e; --green-light: #e6f7f1; --green-dark: #0d6b4a; --text: #0f1117; --text-muted: #6b7280; --border: #e5e7eb; --bg: #f9fafb; --white: #ffffff; --font-head: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif; --yellow: #f59e0b; --purple: #6366f1; }
  body.dark { --text: #f1f5f9; --text-muted: #94a3b8; --border: #2d3748; --bg: #0f1117; --white: #1a1f2e; --green-light: #0d2d20; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--white); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; padding: 0 5%; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-head); font-size: 19px; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-mark { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .btn-nav { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 7px 14px; font-family: var(--font-body); font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .btn-nav:hover { border-color: var(--green); color: var(--green); }

  .page { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
  .page-header { text-align: center; margin-bottom: 32px; }
  .page-header h1 { font-family: var(--font-head); font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .page-header p { color: var(--text-muted); font-size: 14px; }

  .tabs { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 24px; gap: 4px; }
  .tab { flex: 1; padding: 9px; text-align: center; border-radius: 9px; font-family: var(--font-head); font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: all 0.15s; }
  .tab.active { background: var(--white); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 28px; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .podium-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 18px; font-weight: 800; color: white; }
  .podium-name { font-size: 12px; font-weight: 600; text-align: center; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .podium-score { font-size: 11px; color: var(--text-muted); }
  .podium-rank { font-size: 20px; }
  .podium-block { border-radius: 8px 8px 0 0; width: 72px; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 22px; font-weight: 800; color: white; }
  .p1 .podium-block { height: 80px; background: linear-gradient(135deg, #f59e0b, #fcd34d); }
  .p2 .podium-block { height: 56px; background: linear-gradient(135deg, #94a3b8, #cbd5e1); }
  .p3 .podium-block { height: 44px; background: linear-gradient(135deg, #b45309, #d97706); }
  .p1 .podium-avatar { background: linear-gradient(135deg, #f59e0b, #fcd34d); }
  .p2 .podium-avatar { background: linear-gradient(135deg, #94a3b8, #cbd5e1); }
  .p3 .podium-avatar { background: linear-gradient(135deg, #b45309, #d97706); }

  .lb-list { display: flex; flex-direction: column; gap: 8px; }
  .lb-row { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: all 0.15s; }
  .lb-row:hover { border-color: var(--green); }
  .lb-row.me { border-color: var(--green); background: var(--green-light); }
  .lb-rank { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--text-muted); width: 28px; text-align: center; flex-shrink: 0; }
  .lb-rank.gold { color: #f59e0b; }
  .lb-rank.silver { color: #94a3b8; }
  .lb-rank.bronze { color: #b45309; }
  .lb-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 14px; font-weight: 800; color: white; flex-shrink: 0; }
  .lb-info { flex: 1; }
  .lb-name { font-size: 14px; font-weight: 600; }
  .lb-sub { font-size: 12px; color: var(--text-muted); }
  .lb-value { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: var(--green); }

  .my-rank-card { background: var(--green); color: white; border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .my-rank-card h3 { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .my-rank-card p { font-size: 12px; opacity: 0.8; }
  .my-rank-num { font-family: var(--font-head); font-size: 32px; font-weight: 800; }

  .empty { text-align: center; padding: 40px; color: var(--text-muted); }
  .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: bop 1.2s infinite; display: inline-block; margin: 0 3px; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bop { 0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1} }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--white); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform 0.3s; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<nav>
  <a href="app.html" class="logo"><div class="logo-mark">✦</div>StudyGenie</a>
  <div class="nav-right">
    <a href="app.html" class="btn-nav">← Back to Chat</a>
    <button class="btn-nav" onclick="toggleDark()" id="dark-btn">🌙</button>
    <button class="btn-nav" onclick="signOut()" style="color:#e24b4a;border-color:#e24b4a">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>🏆 Leaderboard</h1>
    <p>Top StudyGenie students this week</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('streak')">🔥 Streaks</button>
    <button class="tab" onclick="switchTab('questions')">❓ Questions</button>
    <button class="tab" onclick="switchTab('quiz')">🧠 Quiz Scores</button>
  </div>

  <div id="my-rank"></div>
  <div id="lb-container">
    <div style="text-align:center;padding:40px">
      <div class="dots"><span></span><span></span><span></span></div>
      <p style="margin-top:12px;font-size:14px;color:var(--text-muted)">Loading leaderboard...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  let currentTab = 'streak';
  let currentUserId = null;

  if (localStorage.getItem('studygenie-dark') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('dark-btn').textContent = '☀️';
  }
  function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    document.getElementById('dark-btn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('studygenie-dark', isDark);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function init() {
    const { data: { session } } = await _supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUserId = session.user.id;
    loadTab('streak');
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['streak','questions','quiz'][i] === tab);
    });
    loadTab(tab);
  }

  async function loadTab(tab) {
    document.getElementById('lb-container').innerHTML = `
      <div style="text-align:center;padding:40px">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>`;
    document.getElementById('my-rank').innerHTML = '';

    let data = [];

    if (tab === 'streak') {
      const { data: rows } = await _supa
        .from('study_streaks')
        .select('user_id, current_streak, longest_streak, profiles(full_name, level)')
        .order('current_streak', { ascending: false })
        .limit(20);
      data = (rows || []).map(r => ({
        id: r.user_id,
        name: r.profiles?.full_name || 'Student',
        sub: r.profiles?.level || '',
        value: r.current_streak,
        label: 'day streak'
      }));
    } else if (tab === 'questions') {
      // Aggregate questions per user from question_history
      const { data: rows } = await _supa
        .from('question_history')
        .select('user_id, profiles(full_name, level)')
        .order('created_at', { ascending: false });
      const counts = {};
      (rows || []).forEach(r => {
        const id = r.user_id;
        if (!counts[id]) counts[id] = { id, name: r.profiles?.full_name || 'Student', sub: r.profiles?.level || '', value: 0 };
        counts[id].value++;
      });
      data = Object.values(counts).sort((a,b) => b.value - a.value).slice(0, 20).map(r => ({ ...r, label: 'questions asked' }));
    } else if (tab === 'quiz') {
      const { data: rows } = await _supa
        .from('quiz_history')
        .select('user_id, score, total, profiles(full_name, level)')
        .order('created_at', { ascending: false });
      const scores = {};
      (rows || []).forEach(r => {
        const id = r.user_id;
        const pct = Math.round((r.score / r.total) * 100);
        if (!scores[id]) scores[id] = { id, name: r.profiles?.full_name || 'Student', sub: r.profiles?.level || '', total: 0, sum: 0 };
        scores[id].total++;
        scores[id].sum += pct;
      });
      data = Object.values(scores)
        .filter(s => s.total >= 1)
        .map(s => ({ ...s, value: Math.round(s.sum / s.total), label: 'avg quiz score' }))
        .sort((a,b) => b.value - a.value)
        .slice(0, 20);
    }

    renderLeaderboard(data, tab);
  }

  function renderLeaderboard(data, tab) {
    if (!data.length) {
      document.getElementById('lb-container').innerHTML = `<div class="empty">No data yet — be the first! 🎯</div>`;
      return;
    }

    // My rank card
    const myIdx = data.findIndex(r => r.id === currentUserId);
    if (myIdx !== -1) {
      const me = data[myIdx];
      const suffix = tab === 'quiz' ? '%' : '';
      document.getElementById('my-rank').innerHTML = `
        <div class="my-rank-card">
          <div>
            <h3>Your ranking</h3>
            <p>${me.value}${suffix} ${me.label}</p>
          </div>
          <div class="my-rank-num">#${myIdx + 1}</div>
        </div>`;
    }

    // Podium for top 3
    const top3 = data.slice(0, 3);
    const podiumOrder = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : top3;
    const podiumClasses = top3.length >= 2 ? ['p2', 'p1', 'p3'] : ['p1'];
    const suffix = tab === 'quiz' ? '%' : '';

    let podiumHTML = '';
    if (data.length >= 2) {
      podiumHTML = `<div class="podium">` + podiumOrder.map((item, i) => {
        const cls = podiumClasses[i];
        const rank = cls === 'p1' ? '🥇' : cls === 'p2' ? '🥈' : '🥉';
        const initials = item.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        return `<div class="podium-item ${cls}">
          <div class="podium-avatar">${initials}</div>
          <div class="podium-name">${item.name.split(' ')[0]}</div>
          <div class="podium-score">${item.value}${suffix}</div>
          <div class="podium-block">${rank}</div>
        </div>`;
      }).join('') + `</div>`;
    }

    // Full list
    const listHTML = data.map((item, i) => {
      const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const isMe = item.id === currentUserId;
      const initials = item.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      return `<div class="lb-row ${isMe ? 'me' : ''}">
        <div class="lb-rank ${rankClass}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</div>
        <div class="lb-avatar">${initials}</div>
        <div class="lb-info">
          <div class="lb-name">${item.name}${isMe ? ' (you)' : ''}</div>
          ${item.sub ? `<div class="lb-sub">${item.sub}</div>` : ''}
        </div>
        <div class="lb-value">${item.value}${suffix}</div>
      </div>`;
    }).join('');

    document.getElementById('lb-container').innerHTML = podiumHTML + `<div class="lb-list">${listHTML}</div>`;
  }

  init();
</script>
</body>
</html>
